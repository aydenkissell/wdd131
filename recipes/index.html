<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Book | Apple Crisp & More</title>

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Recipe Book - Delicious Home Recipes">
  <meta property="og:description" content="Discover amazing home recipes including our famous Apple Crisp. Easy to follow, delicious to eat.">
  <meta property="og:url" content="https://yourgithubusername.github.io/wdd131/recipes">
  <meta property="og:image" content="images/social-preview-image.png">

  <!-- X Card -->
  <meta name="twitter:card" content="Social Preview Image">
  <meta name="twitter:title" content="Recipe Book - Delicious Home Recipes">
  <meta name="twitter:description" content="Discover amazing home recipes including our famous Apple Crisp. Easy to follow, delicious to eat.">
  <meta name="twitter:image" content="images/social-preview-image.png">

  <!-- Favicon & Apple Touch Icon -->
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <!-- Google Fonts: Amatic SC + Lato -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER: Logo + Title -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-area">
        <img src="images/recipe_book_icon.png" alt="Recipe Book Logo" class="logo">
        <div class="title-area">
          <h1>Recipe Book</h1>
          <p class="tagline">Home-cooked with love</p>
        </div>
      </div>

      <!-- Search Area — now a form for JS hook -->
      <form id="search-form" class="search-area" role="search">
        <input
          type="text"
          id="search-input"
          placeholder="Search recipes..."
          aria-label="Search recipes by name, description, or tag"
          autocomplete="off"
        >
        <button type="submit" aria-label="Search">
          <img src="images/search_icon.png" alt="Search">
        </button>
      </form>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>

    <!-- Results count line (shown after search) -->
    <p id="results-count" class="results-count"></p>

    <!-- Search results injected here by JS -->
    <section id="search-results"></section>

    <!-- Random Recipe of the Day injected here by JS -->
    <section id="random-recipe"></section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">

      <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
      </div>

      <p class="attribution">
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
          Recipe icons created by Freepik - Flaticon
        </a>
      </p>

      <p class="copyright">&copy; 2026 Recipe Book. All rights reserved.</p>
    </div>
  </footer>

  <!-- recipes.js must load BEFORE main.js -->
  <script src="recipes.js"></script>
  <script src="main.js"></script>

</body>
</html>
